<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies Center — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- Cinematic ambient background -->
  <div class="bg-scene">
    <div class="film-grain"></div>
    <div class="spotlight spotlight-1"></div>
    <div class="spotlight spotlight-2"></div>
    <div class="reel-strip reel-top"></div>
    <div class="reel-strip reel-bottom"></div>
    <div class="scanlines"></div>
  </div>

  <!-- Floating particles -->
  <canvas id="particleCanvas"></canvas>

  <!-- Main card -->
  <main class="stage">
    <div class="card" id="loginCard">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <span class="clapboard">🎬</span>
          <div class="icon-ring"></div>
        </div>
        <h1 class="brand-title">Movies Center</h1>
        <p class="brand-sub">Your cinematic universe awaits</p>
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
        <span class="divider-line"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="field-group" id="fieldUsername">
          <label for="username">
            <i class="fa-solid fa-user"></i>
            <span>Username</span>
          </label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
            <span class="input-border"></span>
          </div>
        </div>

        <div class="field-group" id="fieldPassword">
          <label for="password">
            <i class="fa-solid fa-lock"></i>
            <span>Password</span>
          </label>
          <div class="input-wrap password-wrap">
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
            <span class="input-border"></span>
          </div>
        </div>

        <div class="error-box" id="errorBox" aria-live="polite">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="errorMsg"></span>
        </div>

        <div class="options">
          <label class="remember-label" for="remember">
            <input type="checkbox" id="remember" />
            <span class="custom-check">
              <i class="fa-solid fa-check"></i>
            </span>
            <span>Remember me</span>
          </label>
          <a href="forget.html" class="link-accent">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
          <span class="btn-loader" id="btnLoader">
            <i class="fa-solid fa-spinner fa-spin"></i>
          </span>
          <div class="btn-shine"></div>
        </button>

        <p class="signup-row">
          New here? <a href="signup.html" class="link-accent">Create an account</a>
        </p>

      </form>

    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
