<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies Center — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="forget.css">
</head>
<body>

  <div class="bg-scene">
    <div class="film-grain"></div>
    <div class="spotlight-1"></div>
    <div class="spotlight-2"></div>
    <div class="reel-strip reel-top"></div>
    <div class="reel-strip reel-bottom"></div>
    <div class="scanlines"></div>
  </div>

  <canvas id="particleCanvas"></canvas>

  <main class="stage">
    <div class="card" id="forgetCard">

      <div class="brand">
        <div class="brand-icon">
          <span class="clapboard">🎬</span>
          <div class="icon-ring"></div>
        </div>
        <h1 class="brand-title">Movies Center</h1>
        <p class="brand-sub">Reset your password</p>
      </div>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-dot"></span>
        <span class="divider-line"></span>
      </div>

      <div class="info-text" id="stepInfo">
        Enter the email or username you used when you joined and we'll help you reset your password.
      </div>

      <div id="stepOne">

        <form id="forgetForm" novalidate>

          <div class="field-group" id="fieldEmail">
            <label for="emailInput">
              <i class="fa-solid fa-envelope"></i>
              <span>Email or Username</span>
            </label>
            <div class="input-wrap">
              <input type="text" id="emailInput" placeholder="Enter your email or username" required>
              <span class="input-border"></span>
            </div>
          </div>

          <div class="error-box" id="errorBox" aria-live="polite">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMsg"></span>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="btn-text">Send Reset Link</span>
            <span class="btn-icon"><i class="fa-solid fa-paper-plane"></i></span>
            <span class="btn-loader" id="btnLoader">
              <i class="fa-solid fa-spinner fa-spin"></i>
            </span>
            <div class="btn-shine"></div>
          </button>

        </form>

      </div>

      <div id="stepTwo" style="display:none;">

        <div class="success-box">
          <div class="success-icon">
            <i class="fa-solid fa-circle-check"></i>
          </div>
          <h3 class="success-title">Check your email!</h3>
          <p class="success-desc">
            If an account exists for <strong id="submittedEmail"></strong>,
            you will receive a password reset link shortly.
          </p>
        </div>

        <div class="field-group" id="fieldNewPass">
          <label for="newPassword">
            <i class="fa-solid fa-lock"></i>
            <span>New Password</span>
          </label>
          <div class="input-wrap password-wrap">
            <input type="password" id="newPassword" placeholder="Enter your new password">
            <button type="button" class="eye-btn" id="eyeBtn">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
            <span class="input-border"></span>
          </div>
        </div>

        <div class="error-box" id="errorBox2" aria-live="polite">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="errorMsg2"></span>
        </div>

        <button class="submit-btn" id="resetBtn">
          <span class="btn-text">Set New Password</span>
          <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
          <span class="btn-loader" id="btnLoader2">
            <i class="fa-solid fa-spinner fa-spin"></i>
          </span>
          <div class="btn-shine"></div>
        </button>

      </div>

      <p class="back-row">
        <a href="index.html" class="link-accent">
          <i class="fa-solid fa-arrow-left"></i>
          Back to Sign In
        </a>
      </p>

    </div>
  </main>

  <script src="forget.js"></script>
</body>
</html>
